spring.application.name=talentboard

# Configuración dinámica para la base de datos (Docker / Local)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/talentboard_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:salva_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:xpqretz6090**}
spring.datasource.driver-class-name=org.postgresql.Driver

# Configuración de Hibernate y JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Evitar caídas si la BD tarda unos segundos en responder al iniciar
spring.datasource.hikari.initialization-fail-timeout=60000



