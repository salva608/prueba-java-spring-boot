<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"> <head>
    <title>TalentBoard - Vacancies</title>
</head>
<body>
<div th:if="${#authorization.expression('hasAnyRole(''RECRUITER'', ''ADMIN'')')}">
    <script>window.location.href = '/recruiter/dashboard';</script>
</div>

<h2>Available Vacancies</h2>


<div style="float: right;">
    <form th:action="@{/logout}" method="post">
        <button type="submit" style="background-color: #ff4d4d; color: white;">Logout</button>
    </form>
</div>

<div sec:authorize="hasAnyRole('ADMIN', 'RECRUITER')">
    <a href="/vacancies/new"><button>Create New Vacancy</button></a>
</div>

<hr/>

<table border="1">
    <thead>
    <tr>
        <th>Title</th>
        <th>Category</th>
        <th>Actions</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="vacancy : ${vacancies}">
        <td th:text="${vacancy.title}">Title</td>
        <td th:text="${vacancy.category}">Category</td>
        <td>
            <a th:href="@{/vacancies/{id}(id=${vacancy.id})}">View Details</a>

            <span sec:authorize="hasRole('CANDIDATE')">
                        | <a th:href="@{/applications/apply/{id}(id=${vacancy.id})}">Apply Now</a>
                    </span>
        </td>
    </tr>
    </tbody>
</table>
</body>
</html>
